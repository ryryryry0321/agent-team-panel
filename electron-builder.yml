appId: com.ryoya.agent-teams-panel
productName: Agent Teams Panel

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - node_modules/**/*
  - package.json

asarUnpack:
  - "**/node-pty/**"

mac:
  identity: null
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: dir
      arch:
        - arm64
        - x64

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
